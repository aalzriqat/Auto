sonar.projectKey=aalzriqat_Auto
sonar.organization=aalzriqat

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=graphify-out/**,.scannerwork/**,sonar-output/**,coverage/**,testsprite_tests/**,load-tests/**
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,app/**,components/**,dealer-worker/**,hooks/**,lib/**,marketing/**,public/**
# app/page.tsx, app/privacy/page.tsx, and app/terms/page.tsx each hold a
# mirrored { en: {...}, ar: {...} } content dictionary — same keys, different
# language strings. CPD flags that structural mirroring as duplication even
# though there's no duplicated logic, so these are excluded from the check.
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,testsprite_tests/**,load-tests/**,graphify-out/**,app/page.tsx,app/privacy/page.tsx,app/terms/page.tsx
