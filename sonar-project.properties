# Translation dictionaries structurally mirror the same key sequence across
# EN and AR (and across domain files that share common keys), which
# duplicate-code detectors flag as "duplication" even though the content
# (the actual translated strings) differs. That's an expected property of
# this file class, not technical debt — exclude it from CPD analysis only;
# bug/vulnerability/code-smell rules still run on these files.
sonar.cpd.exclusions=lib/i18n/**/*.ts
