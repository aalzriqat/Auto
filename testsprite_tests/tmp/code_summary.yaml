version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 16 (App Router)
  - backend: Convex (real-time backend-as-a-service)
  - auth: Clerk
  - ui_library: shadcn/ui + Tailwind CSS
  - forms: react-hook-form + zod
  - i18n: custom LanguageProvider (English / Arabic RTL)

routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Public landing page
  - path: /sign-in
    file: app/sign-in/[[...sign-in]]/page.tsx
    auth_required: false
    description: Clerk sign-in page
  - path: /sign-up
    file: app/sign-up/[[...sign-up]]/page.tsx
    auth_required: false
    description: Clerk sign-up page
  - path: /dashboard
    file: app/(dashboard)/dashboard/page.tsx
    auth_required: true
    description: Post-login entry point. Has no org segment yet — it loads the signed-in user's organizations, redirects to /{orgId}/dashboard if they belong to one (their first org), or renders the onboarding wizard in-place if they belong to none.
  - path: /{orgId}/dashboard
    file: app/(dashboard)/[orgId]/dashboard/page.tsx
    auth_required: true
    description: Main KPI dashboard showing revenue, vehicles, leads. orgId is a Convex organization id taken from the URL; the page redirects back to /dashboard if the signed-in user is not a member of that org. Users with the SALES role are auto-redirected to /{orgId}/sales.
  - path: /{orgId}/vehicles
    file: app/(dashboard)/[orgId]/vehicles/page.tsx
    auth_required: true
    description: Vehicle inventory list with search, filter, add/edit/delete
  - path: /{orgId}/customers
    file: app/(dashboard)/[orgId]/customers/page.tsx
    auth_required: true
    description: Customer CRM list with search and dialog-based CRUD
  - path: /{orgId}/leads
    file: app/(dashboard)/[orgId]/leads/page.tsx
    auth_required: true
    description: Lead pipeline board with Kanban view and stage management
  - path: /{orgId}/sales
    file: app/(dashboard)/[orgId]/sales/page.tsx
    auth_required: true
    description: Sales home with cash/installment wizard launchers, in-progress draft resume (with Discard), and pending profit-approval deals (with Cancel)
  - path: /{orgId}/sales/sales
    file: app/(dashboard)/[orgId]/sales/sales/page.tsx
    auth_required: true
    description: Completed sales list with search, edit, delete, PDF export, and a link to the linked finance application
  - path: /{orgId}/applications
    file: app/(dashboard)/[orgId]/applications/page.tsx
    auth_required: true
    description: Finance applications list linked to installment sales
  - path: /{orgId}/expenses
    file: app/(dashboard)/[orgId]/expenses/page.tsx
    auth_required: true
    description: Expense tracking list with CRUD
  - path: /{orgId}/approvals
    file: app/(dashboard)/[orgId]/approvals/page.tsx
    auth_required: true
    description: Profit approval requests for managers to approve/reject
  - path: /{orgId}/commissions
    file: app/(dashboard)/[orgId]/commissions/page.tsx
    auth_required: true
    description: Commission calculations per salesperson
  - path: /{orgId}/accounting
    file: app/(dashboard)/[orgId]/accounting/page.tsx
    auth_required: true
    description: General ledger, fixed assets, partner equity, and claims tabs
  - path: /{orgId}/reports
    file: app/(dashboard)/[orgId]/reports/page.tsx
    auth_required: true
    description: Financial and inventory reports with date filtering
  - path: /{orgId}/tasks
    file: app/(dashboard)/[orgId]/tasks/page.tsx
    auth_required: true
    description: Task management with assignment and history
  - path: /{orgId}/team
    file: app/(dashboard)/[orgId]/team/page.tsx
    auth_required: true
    description: Team member management with role assignment
  - path: /{orgId}/settings/general
    file: app/(dashboard)/[orgId]/settings/general/page.tsx
    auth_required: true
    description: Org settings (currency, VAT, timezone, logo, WhatsApp)
  - path: /{orgId}/settings/finance
    file: app/(dashboard)/[orgId]/settings/finance/page.tsx
    auth_required: true
    description: Finance company configuration for installment sales
  - path: /{orgId}/settings/pipeline
    file: app/(dashboard)/[orgId]/settings/pipeline/page.tsx
    auth_required: true
    description: Lead pipeline stage configuration
  - path: /{orgId}/settings/lead-sources
    file: app/(dashboard)/[orgId]/settings/lead-sources/page.tsx
    auth_required: true
    description: Manage lead source labels
  - path: /{orgId}/settings/custom-fields
    file: app/(dashboard)/[orgId]/settings/custom-fields/page.tsx
    auth_required: true
    description: Create custom fields for vehicles, customers, leads
  - path: /{orgId}/settings/commission
    file: app/(dashboard)/[orgId]/settings/commission/page.tsx
    auth_required: true
    description: Tiered commission configuration by profit threshold
  - path: /{orgId}/settings/branches
    file: app/(dashboard)/[orgId]/settings/branches/page.tsx
    auth_required: true
    description: Manage dealership branches
  - path: /{orgId}/settings/valuation-companies
    file: app/(dashboard)/[orgId]/settings/valuation-companies/page.tsx
    auth_required: true
    description: Manage third-party vehicle valuation companies
  - path: /{orgId}/settings/feedback
    file: app/(dashboard)/[orgId]/settings/feedback/page.tsx
    auth_required: true
    description: Inbox for in-app user feedback submissions

features:
  - name: Org Routing & Entry Redirect
    description: Active organization is carried entirely in the URL (the [orgId] segment), not in client storage. The /dashboard entry point picks the user's org (or shows onboarding), and OrgProvider redirects back to /dashboard if a URL references an org the signed-in user does not belong to.
    files:
      - components/providers/OrgProvider.tsx
      - app/(dashboard)/dashboard/page.tsx
      - app/(dashboard)/[orgId]/layout.tsx
    entry_route: /dashboard
    user_interactions:
      - Sign in and land on /{orgId}/dashboard automatically
      - Switch organizations via the OrgSwitcher in the top nav; URL's orgId segment updates while staying on the same sub-page
      - Manually navigate to a URL with an org id the user does not belong to and get redirected back to /dashboard instead of seeing an error
    api_calls:
      - method: QUERY
        endpoint: convex/organizations.listMine
    auth_required: true

  - name: Onboarding Wizard
    description: Multi-step wizard for first-time users (zero org memberships) to create their org and pick currency
    files:
      - app/(dashboard)/dashboard/page.tsx
    entry_route: /dashboard
    user_interactions:
      - New user with no org sees the wizard rendered in place of a redirect
      - Enter dealership name in text input
      - Click Continue to proceed to currency step
      - Select currency from dropdown
      - Click Continue, then Skip or load defaults for lead sources and pipeline
      - Click "Go to Dashboard" button
      - Redirected to /{newOrgId}/dashboard
    api_calls:
      - method: MUTATION
        endpoint: convex/organizations.create
      - method: MUTATION
        endpoint: convex/orgSettings.upsert
    auth_required: true

  - name: Vehicle Inventory Management
    description: Add, edit, delete vehicles with VIN decode, image upload, approval workflow
    files:
      - app/(dashboard)/[orgId]/vehicles/page.tsx
      - components/vehicles/VehicleDialog.tsx
    entry_route: /{orgId}/vehicles
    user_interactions:
      - Click "Add Vehicle" button to open dialog
      - Type a VIN and click the decode icon
      - Verify make, model, year auto-filled by NHTSA API
      - Fill color, mileage, purchase price, selling price
      - Click Save
      - See new vehicle in inventory table
      - Click pencil icon to edit a vehicle
      - Click trash icon and confirm deletion
      - Search vehicles using search input
    api_calls:
      - method: QUERY
        endpoint: convex/vehicles.list
      - method: MUTATION
        endpoint: convex/vehicles.create
    auth_required: true

  - name: Customer Management
    description: Create and manage customer records
    files:
      - app/(dashboard)/[orgId]/customers/page.tsx
      - components/customers/CustomerDialog.tsx
    entry_route: /{orgId}/customers
    user_interactions:
      - Search customers by name or phone
      - Click "Add Customer" to open dialog
      - Fill firstName, lastName, phone, email
      - Click Save to create
      - Click edit icon to update a customer
      - Click delete icon and confirm to remove
    api_calls:
      - method: QUERY
        endpoint: convex/customers.list
      - method: MUTATION
        endpoint: convex/customers.create
    auth_required: true

  - name: Lead Pipeline
    description: Kanban board for tracking sales leads through configurable pipeline stages
    files:
      - app/(dashboard)/[orgId]/leads/page.tsx
      - components/leads/LeadDialog.tsx
    entry_route: /{orgId}/leads
    user_interactions:
      - View leads grouped by stage in Kanban columns
      - Click "Add Lead" button
      - Select customer from searchable dropdown
      - Select vehicle of interest from searchable dropdown
      - Select lead source and pipeline stage
      - Click Save
      - Click a lead card to edit it
      - Change stage dropdown to move lead through pipeline
    api_calls:
      - method: QUERY
        endpoint: convex/leads.list
      - method: MUTATION
        endpoint: convex/leads.create
    auth_required: true

  - name: Cash & Installment Sale Wizard
    description: Three-step guided wizard to record a cash or installment vehicle sale, with draft auto-save and resume
    files:
      - app/(dashboard)/[orgId]/sales/page.tsx
      - components/sales/SalesWizard.tsx
    entry_route: /{orgId}/sales
    user_interactions:
      - Click "Cash Sale" or "Installment" button on sales home page
      - Step 1: Select vehicle from searchable list
      - Step 2: Select or create customer, enter sale price
      - Step 3: Review summary and click Confirm
      - See sale appear in recent sales list
    api_calls:
      - method: MUTATION
        endpoint: convex/sales.create
      - method: MUTATION
        endpoint: convex/wizardDrafts.saveDraft
    auth_required: true

  - name: Cancel In-Progress Draft and Pending Deals
    description: A salesperson can discard their auto-saved wizard draft, or cancel their own pending profit-approval request, directly from the sales home page
    files:
      - app/(dashboard)/[orgId]/sales/page.tsx
      - convex/approvals.ts
      - convex/wizardDrafts.ts
    entry_route: /{orgId}/sales
    user_interactions:
      - With an in-progress draft saved, click "Discard" next to "Resume Draft" to remove it
      - With a PENDING profit-approval deal listed under "Pending Deals", click "Cancel" to withdraw the request
      - Cancelled/discarded items disappear from their respective lists
    api_calls:
      - method: MUTATION
        endpoint: convex/wizardDrafts.clearDraft
      - method: MUTATION
        endpoint: convex/approvals.cancelMyApproval
    auth_required: true

  - name: Expense Tracking
    description: Record and categorize operational expenses
    files:
      - app/(dashboard)/[orgId]/expenses/page.tsx
      - components/expenses/ExpenseDialog.tsx
    entry_route: /{orgId}/expenses
    user_interactions:
      - Click "Record Expense" button
      - Fill title, amount, category (REPAIR/MAINTENANCE/DETAILING)
      - Enter vendor name and date
      - Optionally link to a vehicle
      - Click Save
      - Search expenses by title or category
      - Click delete and confirm to remove
    api_calls:
      - method: MUTATION
        endpoint: convex/expenses.create
      - method: QUERY
        endpoint: convex/expenses.list
    auth_required: true

  - name: Approval Workflow
    description: Managers review and approve/reject below-minimum-profit sale requests
    files:
      - app/(dashboard)/[orgId]/approvals/page.tsx
    entry_route: /{orgId}/approvals
    user_interactions:
      - View pending approval cards showing salesperson and vehicle
      - See requested profit vs minimum allowed
      - Click Approve button to approve the deal
      - Click Reject button to reject the deal
      - Approved card disappears from the list
    api_calls:
      - method: QUERY
        endpoint: convex/approvals.listPendingApprovals
      - method: MUTATION
        endpoint: convex/approvals.respondToApproval
    auth_required: true

  - name: Language Toggle (EN/AR RTL)
    description: Switch UI between English (LTR) and Arabic (RTL)
    files:
      - components/providers/LanguageProvider.tsx
      - components/layout/LanguageSwitcher.tsx
      - components/layout/TopNav.tsx
    entry_route: /{orgId}/dashboard
    user_interactions:
      - Click the language toggle button in the top nav (shows EN or AR)
      - UI text switches to Arabic
      - Layout direction flips to RTL
      - Click again to return to English LTR
    api_calls: []
    auth_required: true

  - name: General Settings
    description: Configure org currency, VAT rate, and branding
    files:
      - app/(dashboard)/[orgId]/settings/general/page.tsx
    entry_route: /{orgId}/settings/general
    user_interactions:
      - Navigate to Settings > General
      - Change currency dropdown to AED
      - Enter VAT rate
      - Click Save
      - Verify currency symbol updates across app
    api_calls:
      - method: MUTATION
        endpoint: convex/orgSettings.upsert
    auth_required: true

  - name: Pipeline Stage Configuration
    description: Customize lead pipeline stage labels, colors, and order
    files:
      - app/(dashboard)/[orgId]/settings/pipeline/page.tsx
    entry_route: /{orgId}/settings/pipeline
    user_interactions:
      - Navigate to Settings > Pipeline
      - Click "Seed Defaults" to load default stages
      - Edit a stage label
      - Change stage color
      - Drag stages to reorder
      - Toggle a stage inactive
    api_calls:
      - method: MUTATION
        endpoint: convex/orgPipelineStages.seed
      - method: MUTATION
        endpoint: convex/orgPipelineStages.update
    auth_required: true

  - name: Custom Fields
    description: Create custom fields for vehicles, customers, and leads
    files:
      - app/(dashboard)/[orgId]/settings/custom-fields/page.tsx
      - components/custom-fields/CustomFieldsSection.tsx
    entry_route: /{orgId}/settings/custom-fields
    user_interactions:
      - Navigate to Settings > Custom Fields
      - Select entity type tab (Vehicle / Customer / Lead)
      - Click "Add Field"
      - Enter field name, key, type
      - Save field
      - Custom field appears in the entity's create/edit dialog
    api_calls:
      - method: MUTATION
        endpoint: convex/orgCustomFields.create
      - method: QUERY
        endpoint: convex/orgCustomFields.list
    auth_required: true

  - name: Reports
    description: Financial and inventory analytics with date range filtering
    files:
      - app/(dashboard)/[orgId]/reports/page.tsx
    entry_route: /{orgId}/reports
    user_interactions:
      - Navigate to Reports
      - Select a date range from the date picker
      - View total revenue, profit, and expenses charts
      - See salesperson performance breakdown
    api_calls:
      - method: QUERY
        endpoint: convex/reports.getSummary
    auth_required: true

known_limitations:
  - issue: Auth flows use Clerk hosted pages — E2E tests need pre-seeded test credentials
    location: app/sign-in/[[...sign-in]]/page.tsx
    impact: Login step requires real Clerk test user credentials in env vars
  - issue: VIN decode calls external NHTSA API — may be slow or unavailable in CI
    location: components/vehicles/VehicleDialog.tsx
    impact: VIN decode assertions may need a mock or longer timeout
  - issue: All authenticated routes now require a valid orgId URL segment (/{orgId}/...); there is no static /vehicles, /customers, etc. path anymore
    location: app/(dashboard)/[orgId]/
    impact: Tests must navigate via UI links/redirects (or capture the orgId from the post-login redirect) rather than hardcoding a bare path like /vehicles
