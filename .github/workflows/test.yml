name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install -g pnpm && pnpm install

    - name: Run unit + integration tests with coverage
      run: pnpm test --coverage
      env:
        NODE_ENV: test

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7

    - name: Coverage summary
      run: |
        if [ -f coverage/coverage-summary.json ]; then
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const fmt = (v) => v.pct.toFixed(1) + '%';
            console.log('| Metric | Coverage |');
            console.log('|--------|----------|');
            console.log('| Lines | ' + fmt(s.lines) + ' |');
            console.log('| Functions | ' + fmt(s.functions) + ' |');
            console.log('| Branches | ' + fmt(s.branches) + ' |');
            console.log('| Statements | ' + fmt(s.statements) + ' |');
          " >> $GITHUB_STEP_SUMMARY
        fi
      if: always()

  type-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install -g pnpm && pnpm install

    - name: TypeScript type check
      run: pnpm exec tsc --noEmit

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install -g pnpm && pnpm install

    - name: Lint
      run: pnpm lint
