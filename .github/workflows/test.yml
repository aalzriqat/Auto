name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false

    - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: 11.13.0

    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22.21.1'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Run unit + integration tests with coverage
      run: |
        pnpm test:coverage
        pnpm test:coverage:sonar
      env:
        NODE_ENV: test

    - name: Upload coverage report
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7

    - name: Coverage summary
      run: |
        if [ -f coverage/coverage-summary.json ]; then
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const fmt = (v) => v.pct.toFixed(1) + '%';
            console.log('| Metric | Coverage |');
            console.log('|--------|----------|');
            console.log('| Lines | ' + fmt(s.lines) + ' |');
            console.log('| Functions | ' + fmt(s.functions) + ' |');
            console.log('| Branches | ' + fmt(s.branches) + ' |');
            console.log('| Statements | ' + fmt(s.statements) + ' |');
          " >> $GITHUB_STEP_SUMMARY
        fi
      if: always()

  type-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false

    - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: 11.13.0

    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22.21.1'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: TypeScript type check
      run: pnpm typecheck

  convex-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false

    - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: 11.13.0

    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22.21.1'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    # `convex codegen` requires a configured deployment since Convex 1.42;
    # CONVEX_AGENT_MODE=anonymous runs a throwaway local backend so CI needs
    # no cloud credentials. `dev --once` pushes the code (full schema/function
    # validation) and regenerates convex/_generated for the freshness check.
    # auth.config.ts reads CLERK_JWT_ISSUER_DOMAIN and CLERK_DEV_JWT_ISSUER_DOMAIN
    # from the deployment's env, and `convex env set` refuses to run before a
    # deployment exists — so the first `dev --once` only bootstraps the
    # anonymous deployment (its push is allowed to fail on the missing env
    # vars), then both vars are set and the real validation pass runs.
    - name: Generate Convex bindings and validate backend types
      run: |
        pnpm exec convex dev --once --typecheck disable || true
        pnpm exec convex env set CLERK_JWT_ISSUER_DOMAIN https://ci-placeholder.clerk.accounts.dev
        pnpm exec convex env set CLERK_DEV_JWT_ISSUER_DOMAIN https://ci-placeholder-dev.clerk.accounts.dev
        pnpm exec convex dev --once --typecheck enable
      env:
        CONVEX_AGENT_MODE: anonymous

    - name: Verify generated Convex files are committed
      run: git diff --exit-code convex/_generated

    - name: Convex tsconfig type check
      run: pnpm typecheck:convex

  dealer-worker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false

    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22.21.1'
        cache: 'npm'
        cache-dependency-path: dealer-worker/package-lock.json

    - name: Install worker dependencies
      run: npm ci --prefix dealer-worker --ignore-scripts

    - name: Worker type check
      run: npm run --prefix dealer-worker typecheck

    - name: Worker tests
      run: npm run --prefix dealer-worker test

    - name: Worker dry-run build
      run: npm run --prefix dealer-worker build

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false

    - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: 11.13.0

    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22.21.1'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Lint
      run: pnpm lint

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false

    - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: 11.13.0

    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22.21.1'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Root dependency audit
      run: pnpm audit --audit-level high --ignore-registry-errors

    - name: Install worker dependencies
      run: npm ci --prefix dealer-worker --ignore-scripts

    - name: Worker dependency audit
      run: |
        set +e
        audit_output="$(npm audit --prefix dealer-worker --audit-level high 2>&1)"
        audit_status=$?
        set -e
        printf '%s\n' "$audit_output"
        if [ "$audit_status" -eq 0 ]; then
          exit 0
        fi
        if printf '%s\n' "$audit_output" | grep -Eiq 'audit endpoint|registry error|ECONNRESET|EAI_AGAIN|ETIMEDOUT|ESOCKETTIMEDOUT|socket hang up|502|503|504'; then
          echo "Ignoring transient npm audit registry failure for dealer-worker."
          exit 0
        fi
        exit "$audit_status"

    - name: Audit summary
      if: always()
      run: |
        echo "## Dependency Audit" >> $GITHUB_STEP_SUMMARY
        echo "### Root" >> $GITHUB_STEP_SUMMARY
        pnpm audit --audit-level high --ignore-registry-errors >> $GITHUB_STEP_SUMMARY 2>&1 || true
        echo "### Dealer worker" >> $GITHUB_STEP_SUMMARY
        npm audit --prefix dealer-worker --audit-level high >> $GITHUB_STEP_SUMMARY 2>&1 || true

  secret-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Secret scan
      uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
