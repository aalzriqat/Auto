name: Build APK (EAS)

# On-demand Android APK build, for getting a fresh install onto a test device
# without a local Android toolchain.
#
# This uses `eas build --local`: it runs the *exact same EAS build recipe* (same
# eas.json profiles, same remote Android keystore) but ON THE GITHUB RUNNER
# instead of Expo's cloud servers. Compared to a cloud build that is a strict
# win on the free tier:
#   - No EAS build queue — the build starts immediately.
#   - Does NOT count against the free-tier monthly Android build cap (local
#     builds are unlimited).
#   - The runner minutes are spent actually compiling (~10-20 min) instead of
#     idling while a queued cloud build runs.
# The only cost is GitHub Actions minutes (free/unlimited on public repos).
#
# The finished APK is attached to the run as an artifact
# ("autoflow-apk-<profile>"). To install: download the artifact, unzip it, open
# the .apk on the device.
#
# Dispatch this against whatever branch/ref you want built (the "Run workflow"
# ref) — e.g. `main`, or a branch that has a feature merged, so the APK carries
# it.
#
# NOTES / CAVEATS:
#  - EXPO_TOKEN is still required: `eas build --local --non-interactive` fetches
#    the project's remote Android keystore from EAS to sign the APK. If a first
#    run fails on credentials, run `eas credentials` locally once to
#    generate/select a keystore, then re-run.
#  - The Android SDK is preinstalled on ubuntu-latest; we pin the build to the
#    runner's bundled JDK 17 (JAVA_HOME_17_X64) since Expo/Gradle needs 17.
#  - If a run ever fails on "no space left on device", the RN build ran the
#    runner out of disk — free some up first (e.g. remove /usr/share/dotnet,
#    /opt/ghc) or fall back to a cloud build (`eas build` without `--local`).

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile (also the OTA channel the APK listens on)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
          - development

permissions:
  contents: read

concurrency:
  # Never cancel an in-flight build — don't throw away a compile that's already
  # running.
  group: build-apk-${{ github.event.inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.13.0

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.21.1"
          cache: "pnpm"

      # Warms the pnpm content-addressable store so the local build's own
      # install phase is fast (hardlinks from the store). `--ignore-scripts` is
      # fine here — the actual native compile is done by `eas build --local`,
      # which runs its own install (applying patches/postinstall) internally.
      - name: Warm dependency store
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build APK locally (via EAS)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PROFILE: ${{ github.event.inputs.profile }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "::error::EXPO_TOKEN secret not set — add it (expo.dev > Account > Access tokens) so the local build can fetch the signing keystore."
            exit 1
          fi
          # Expo/Gradle needs JDK 17; pin to the runner's bundled 17.
          export JAVA_HOME="${JAVA_HOME_17_X64:-$JAVA_HOME}"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          # `--local` runs the EAS build on this runner (no queue, no monthly
          # cap). `--output` drops the signed APK straight to disk.
          npx --yes eas-cli@latest build \
            --platform android \
            --profile "$PROFILE" \
            --local \
            --non-interactive \
            --output "autoflow-${PROFILE}.apk"
          ls -lh autoflow-*.apk

      - name: Summarize
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          SIZE=$(ls -lh autoflow-*.apk | awk '{print $5}')
          {
            echo "### 📦 APK build finished (local)"
            echo ""
            echo "- Profile: \`${{ github.event.inputs.profile }}\`"
            echo "- Ref: \`${{ github.ref_name }}\`"
            echo "- Size: \`${SIZE}\`"
            echo ""
            echo "Grab it from this run's **autoflow-apk-${{ github.event.inputs.profile }}** artifact below, then open the \`.apk\` on the device."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: autoflow-apk-${{ github.event.inputs.profile }}
          path: apps/mobile/autoflow-*.apk
          if-no-files-found: error
