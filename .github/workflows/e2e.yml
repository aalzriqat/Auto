name: E2E Tests (TestSprite)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install -g pnpm && pnpm install

    - name: Build production bundle
      run: pnpm build
      env:
        NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

    - name: Start production server
      run: pnpm start &
      env:
        NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

    - name: Wait for server
      run: npx wait-on http://localhost:3000 --timeout 60000

    - name: Run TestSprite E2E tests
      run: npx @testsprite/testsprite-mcp generateCodeAndExecute
      env:
        TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        LOGIN_USER: ${{ secrets.E2E_LOGIN_USER }}
        LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}

    - name: Upload E2E test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-report
        path: testsprite_tests/
        retention-days: 14
