name: E2E Tests (TestSprite)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Build production bundle
      run: pnpm build
      env:
        NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    - name: Start production server
      run: pnpm start &
      env:
        NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    - name: Wait for server
      run: npx wait-on http://localhost:3000 --timeout 60000

    # The TestSprite CLI reads its execution arguments from
    # testsprite_tests/tmp/config.json, which is normally produced by the
    # interactive MCP bootstrap and is gitignored (it embeds machine paths and
    # credentials) — so CI has to synthesize it from secrets before running.
    - name: Prepare TestSprite execution config
      run: |
        mkdir -p testsprite_tests/tmp
        cat > testsprite_tests/tmp/config.json << EOF
        {
          "status": "commited",
          "type": "frontend",
          "scope": "codebase",
          "localEndpoint": "http://localhost:3000",
          "loginUser": "${E2E_LOGIN_USER}",
          "loginPassword": "${E2E_LOGIN_PASSWORD}",
          "executionArgs": {
            "projectName": "Auto",
            "projectPath": "${GITHUB_WORKSPACE}",
            "testIds": [],
            "serverMode": "production",
            "envs": { "API_KEY": "${TESTSPRITE_API_KEY}" }
          }
        }
        EOF
      env:
        TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        E2E_LOGIN_USER: ${{ secrets.E2E_LOGIN_USER }}
        E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}

    - name: Run TestSprite E2E tests
      run: npx @testsprite/testsprite-mcp generateCodeAndExecute
      env:
        TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        LOGIN_USER: ${{ secrets.E2E_LOGIN_USER }}
        LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}

    - name: Upload E2E test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-report
        path: testsprite_tests/
        retention-days: 14
